<!DOCTYPE html>
<html lang="cs">
<head>
    <!-- Tento řádek nastaví obrázek ungabunga.jpg jako ikonu karty -->
    <link rel="icon" type="image/jpeg" href="ungabunga.jpg">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unga Bunga</title>
    <style>
        html, body {
            background-color: #1a1a1a;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .obsah {
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h1 {
            color: #00adb5;
            font-size: 4rem; /* Extrémně velké písmo pro nadpis */
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            color: #3498db;
            font-size: 2.2rem; /* Velké písmo pro podnadpis */
            margin: 0 0 40px 0;
        }
        .status {
            background: #2d2d2d;
            padding: 20px 30px;
            border-radius: 12px;
            border-left: 6px solid #00adb5;
            display: block;
            margin: 0 auto 30px auto;
            font-size: 1.6rem; /* Velké písmo v boxu */
            color: #f5f5f5;
        }
        .info-patek {
            font-size: 1.5rem;
            color: #a0a0a0;
            display: block;
            font-style: italic;
            margin-bottom: 30px; /* Mezera nad tlačítkem */
        }
        /* Styly pro nové tlačítko */
        .btn-beta {
            display: inline-block;
            background-color: #00adb5;
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: bold;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 173, 181, 0.3);
        }
        .btn-beta:hover {
            background-color: #00cdba;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 173, 181, 0.5);
        }
        .btn-beta:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="obsah">
        <h1>BETA VERZE</h1>
        <p>Beta stránka</p>
        <div class="status">Dřív zkoušené dole ↓</div>
        <span class="info-patek">Toto je stránka na které se budou zkoušet budoucí aktualizace nebo weby.</span>
        
        <!-- Odkaz na Beta verzi v podobě tlačítka -->
        <a href="https://tondafox-site.github.io/ungabunga/" class="btn-beta">Unga bunga</a>
    </div>

</body>
</html>
