<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beta Verze</title>
    <style>
        html, body {
            background-color: #1a1a1a;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .obsah {
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h1 {
            color: #00adb5;
            font-size: 4rem; /* Extrémně velké písmo */
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .popis {
            color: #3498db;
            font-size: 1.8rem; /* Dobře čitelný text */
            line-height: 1.5;
            margin: 0 0 40px 0;
        }
        .status-zadna {
            background: #2d2d2d;
            padding: 20px 30px;
            border-radius: 12px;
            border-left: 6px solid #e74c3c; /* Červený proužek značící "nic tu není" */
            display: block;
            margin: 0 auto;
            font-size: 1.6rem;
            color: #f5f5f5;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="obsah">
        <h1>BETA VERZE</h1>
        
        <p class="popis">
            Na této stránce se budou ukazovat budoucí stránky nebo aktualizace našich stránek.
        </p>
        
        <div class="status-zadna">
            Zatím žádná beta verze
        </div>
    </div>

</body>
</html>
