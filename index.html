<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Unga Bunga V2</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
transition:0.3s;
}

body.light{
background:#f1f5f9;
color:black;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-top:20px;
}

body.light .card{
background:white;
}

input,
textarea,
select,
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.02);
}

.hidden{
display:none;
}

.menu{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:20px;
}

.menu button{
flex:1;
min-width:120px;
}

.news{
background:#334155;
padding:15px;
border-radius:15px;
margin-top:10px;
}

body.light .news{
background:#cbd5e1;
}

.chat{
height:350px;
overflow:auto;
background:#0f172a;
padding:10px;
border-radius:12px;
margin-top:10px;
}

.msg{
background:#334155;
padding:15px;
border-radius:15px;
margin-top:10px;
}

.msgText{
font-size:18px;
font-weight:bold;
margin-top:8px;
word-break:break-word;
}

.msgInfo{
font-size:12px;
opacity:0.7;
margin-top:5px;
}

.profile{
display:flex;
gap:15px;
align-items:center;
}

.avatar{
font-size:55px;
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:10px;
background:#ef4444;
font-size:12px;
margin-left:5px;
}

.userCard{
background:#334155;
padding:15px;
border-radius:15px;
margin-top:10px;
}

body.light .userCard{
background:#cbd5e1;
}

</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->

<div id="loginPage">

<div class="card">

<h1>Unga Bunga V2</h1>

<input id="loginEmail"
placeholder="Email">

<input id="loginPass"
type="password"
placeholder="Heslo">

<input id="registerUsername"
placeholder="Uživatelské jméno">

<button onclick="login()">
Přihlásit
</button>

<button onclick="register()">
Registrovat
</button>

</div>

</div>

<!-- APP -->

<div id="appPage"
class="hidden">

<div class="card">

<div class="profile">

<div class="avatar"
id="avatar">
<i class="fa-solid fa-user"></i>
</div>

<div>

<h2 id="welcome"></h2>

<div id="role"></div>

<div id="level"></div>

</div>

</div>

<div class="menu">

<button onclick="tab('dashboard')">
Dashboard
</button>

<button onclick="tab('chatTab')">
Chat
</button>

<button onclick="tab('profileTab')">
Profil
</button>

<button onclick="tab('profilesTab')">
Profily
</button>

<button onclick="tab('bankTab')">
Banka
</button>

<button onclick="tab('settingsTab')">
Nastavení
</button>

<button id="adminBtn"
class="hidden"
onclick="tab('adminTab')">
Admin
</button>

<button onclick="logout()">
Odhlásit
</button>

</div>

</div>

<!-- DASHBOARD -->

<div class="card tab"
id="dashboard">

<h2>Dashboard</h2>

<h1 id="money"></h1>

<div class="news">
Počet uživatelů:
<span id="usersCount"></span>
</div>

</div>

<!-- CHAT -->

<div class="card tab hidden"
id="chatTab">

<h2>Globální chat</h2>

<div class="chat"
id="chat"></div>

<input id="chatInput"
placeholder="Zpráva">

<button onclick="sendChat()">
Poslat
</button>

</div>

<!-- PROFILE -->

<div class="card tab hidden"
id="profileTab">

<h2>Můj profil</h2>

<textarea id="bio"
placeholder="Veřejný popis"></textarea>

<input id="changeUsername"
placeholder="Nové uživatelské jméno">

<button onclick="saveProfile()">
Uložit profil
</button>

<div class="news"
id="profileInfo"></div>

</div>

<!-- PUBLIC PROFILES -->

<div class="card tab hidden"
id="profilesTab">

<h2>Veřejné profily</h2>

<div id="profilesList"></div>

</div>

<!-- BANKA -->

<div class="card tab hidden"
id="bankTab">

<h2>Banka</h2>

<div class="news">

Aktuální stav:

<h3 id="bankMoney">
0 Hungů
</h3>

</div>

<input
id="bankUser"
placeholder="Uživatelské jméno příjemce">

<input
id="bankAmount"
type="number"
placeholder="Počet Hungů">

<button onclick="sendMoney()">
Poslat Hungy
</button>

<h3>
Historie převodů
</h3>

<div id="bankHistory">

<div class="news">
Žádné převody
</div>

</div>

</div>
<!-- BANKA -->

<div class="card tab hidden"
id="bankTab">

...

</div>

<!-- SETTINGS -->

<div class="card tab hidden"
id="settingsTab">

<h2>Nastavení</h2>

<button onclick="toggleTheme()">
Tmavý / světlý režim
</button>

<input id="newPassword"
type="password"
placeholder="Nové heslo">

<button onclick="changePassword()">
Změnit heslo
</button>

<hr>

<h3>Admin kód</h3>

<input id="adminCodeInput"
placeholder="Zadej admin kód">

<button onclick="useAdminCode()">
Použít admin kód
</button>

<hr>

<h3>Smazání účtu</h3>

<button onclick="deleteMyAccount()">
Smazat účet
</button>

</div>

<!-- ADMIN -->

<div class="card tab hidden"
id="adminTab">

<h2>Admin panel</h2>

<div id="users"></div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
set,
get,
push,
update,
remove,
onValue
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged,
updatePassword,
deleteUser
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {

apiKey:"AIzaSyB-kVC8nGY1JEFEV79Yexpg8-etJDXIp68",

authDomain:"muj-flopik.firebaseapp.com",

databaseURL:"https://muj-flopik-default-rtdb.europe-west1.firebasedatabase.app",

projectId:"muj-flopik",

storageBucket:"muj-flopik.firebasestorage.app",

messagingSenderId:"198721412738",

appId:"1:198721412738:web:a3644bda03f4bc682d5e9b"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const auth =
getAuth(app);

let currentUser = null;
let currentUID = null;

window.login=login;
window.register=register;
window.logout=logout;
window.tab=tab;
window.sendChat=sendChat;
window.saveProfile=saveProfile;
window.toggleTheme=toggleTheme;
window.changePassword=changePassword;
window.useAdminCode=useAdminCode;
window.deleteMyAccount=deleteMyAccount;
window.sendMoney=sendMoney;

/* REGISTER */

async function register(){

let email =
loginEmail.value;

let pass =
loginPass.value;

let username =
registerUsername.value;

if(username.length < 3){

alert("Jméno musí mít alespoň 3 znaky");
return;

}

let usersSnap =
await get(ref(db,"users"));

let users =
usersSnap.val();

let role =
users ? "user" : "admin";

try{

let user =
await createUserWithEmailAndPassword(
auth,
email,
pass
);

await set(
ref(db,"users/"+user.user.uid),
{
email:email,
username:username,
role:role,
money:1000,
bank:0,
xp:0,
level:1,
bio:"",
verified:role==="admin",
banned:false,
muted:false,
registered:new Date().toLocaleDateString()
}
);

alert("Účet vytvořen");

}catch(e){

alert(e.message);

}

}

/* LOGIN */

async function login(){

let email =
loginEmail.value;

let pass =
loginPass.value;

try{

await signInWithEmailAndPassword(
auth,
email,
pass
);

}catch(e){

alert("Špatné přihlášení");

}

}
onAuthStateChanged(auth,
async(user)=>{

if(!user){

loginPage.classList.remove("hidden");

appPage.classList.add("hidden");

return;

}

currentUID = user.uid;

let snap =
await get(
ref(db,"users/"+user.uid)
);

currentUser =
snap.val();

if(!currentUser){

await signOut(auth);
return;

}

if(currentUser.banned){

alert("Tento účet je zabanovaný");

await signOut(auth);

return;

}

openApp();

});

function openApp(){

loginPage.classList.add("hidden");

appPage.classList.remove("hidden");

welcome.innerHTML =

currentUser.username +

(currentUser.verified
? ' <span class="badge">✓</span>'
: '');

money.innerHTML =
currentUser.money + " Hungů";

level.innerHTML =

"Level " +
currentUser.level +
" | XP " +
currentUser.xp;

role.innerHTML =

currentUser.role==="admin"

? '<span style="color:#ef4444;font-weight:bold;">ADMIN</span>'

: '<span style="color:#38bdf8;">USER</span>';

bio.value =
currentUser.bio || "";

changeUsername.value =
currentUser.username || "";

profileInfo.innerHTML =

`
Registrace:
${currentUser.registered}
`;

if(currentUser.role==="admin"){

adminBtn.classList.remove("hidden");

}else{

adminBtn.classList.add("hidden");

}

loadChat();
loadProfiles();
loadUsers();
loadBank();

}

/* TABS */

function tab(id){

document
.querySelectorAll(".tab")
.forEach(t=>{

t.classList.add("hidden");

});

document
.getElementById(id)
.classList.remove("hidden");

}

/* CHAT */

async function sendChat(){

if(currentUser.muted){

alert("Jsi umlčen");
return;

}

if(chatInput.value.trim()===""){
return;
}

await push(
ref(db,"chat"),
{
user:currentUser.username,
text:chatInput.value,
time:new Date().toLocaleTimeString(),
uid:currentUID
}
);

chatInput.value="";

}

function loadChat(){

onValue(
ref(db,"chat"),
(snapshot)=>{

chat.innerHTML="";

let data =
snapshot.val();

if(!data) return;

Object.entries(data).forEach(([id,msg])=>{

chat.innerHTML += `

<div class="msg">

<div class="msgText">
${msg.text}
</div>

<div class="msgInfo">

${msg.user}

•

${msg.time}

</div>

${
currentUser.role==="admin"

?

`<button
onclick="deleteMessage('${id}')">

Smazat

</button>`

:

""
}

</div>

`;

});

}
);

}

window.deleteMessage =
async function(id){

await remove(
ref(db,"chat/"+id)
);

};

/* PROFILE */

async function saveProfile(){

let newName =
changeUsername.value.trim();

if(newName.length < 3){

alert("Jméno musí mít alespoň 3 znaky");
return;

}

let usersSnap =
await get(ref(db,"users"));

let users =
usersSnap.val();

let used = false;

Object.entries(users).forEach(([uid,u])=>{

if(
uid !== currentUID &&
u.username &&
u.username.toLowerCase()
===
newName.toLowerCase()
){

used = true;

}

});

if(used){

alert("Toto jméno už existuje");
return;

}

await update(
ref(db,"users/"+currentUID),
{
bio:bio.value,
username:newName
}
);

alert("Profil uložen");

}

/* PROFILES */

function loadProfiles(){

onValue(
ref(db,"users"),
(snapshot)=>{

profilesList.innerHTML="";

let data =
snapshot.val();

if(!data) return;

usersCount.innerHTML =
Object.keys(data).length;

Object.values(data).forEach(u=>{

profilesList.innerHTML += `

<div class="userCard">

<h3>

${u.username}

${u.verified
? ' <span class="badge">✓</span>'
: ''}

</h3>

<div>
${u.bio || "Bez popisu"}
</div>

<br>

<div>
Registrace:
${u.registered}
</div>

</div>

`;

});

}
);

}

/* SETTINGS */

function toggleTheme(){

document.body.classList.toggle("light");

}

async function changePassword(){

let pass =
newPassword.value;

if(pass.length < 6){

alert("Heslo musí mít alespoň 6 znaků");
return;

}

try{

await updatePassword(
auth.currentUser,
pass
);

alert("Heslo změněno");

}catch(e){

alert("Pro změnu hesla se znovu přihlas");

}

}

/* ADMIN CODE */

async function useAdminCode(){

let code =
adminCodeInput.value.trim();

let codeSnap =
await get(
ref(db,"adminCodeUsed")
);

let used =
codeSnap.val();

if(used){

alert("Admin kód už byl použit");
return;

}

if(code !== "adomin12"){

alert("Špatný admin kód");
return;

}

await update(
ref(db,"users/"+currentUID),
{
role:"admin",
verified:true
}
);

await set(
ref(db,"adminCodeUsed"),
true
);

alert("Nyní jsi ADMIN");

location.reload();

}

/* DELETE ACCOUNT */

async function deleteMyAccount(){

let sure =
confirm("Opravdu chceš smazat účet?");

if(!sure) return;

try{

await remove(
ref(db,"users/"+currentUID)
);

/* SMAZAT CHATY */

let chatSnap =
await get(ref(db,"chat"));

let chats =
chatSnap.val();

if(chats){

for(const [id,msg]
of Object.entries(chats)){

if(msg.uid===currentUID){

await remove(
ref(db,"chat/"+id)
);

}

}

}

await deleteUser(auth.currentUser);

alert("Účet byl smazán");

location.reload();

}catch(e){

alert("Pro smazání účtu se znovu přihlas");

}

}

/* ADMIN PANEL */

function loadUsers(){

onValue(
ref(db,"users"),
(snapshot)=>{

users.innerHTML="";

let data =
snapshot.val();

if(!data) return;

Object.entries(data).forEach(([uid,u])=>{

users.innerHTML += `

<div class="news">

<b>${u.username}</b>

<br><br>

Role:
${u.role}

<br>

Hungy:
${u.money}

<br><br>

<button onclick="banUser('${uid}')">
Ban
</button>

<button onclick="unbanUser('${uid}')">
Unban
</button>

<button onclick="muteUser('${uid}')">
Mute
</button>

<button onclick="unmuteUser('${uid}')">
Unmute
</button>

<button onclick="giveMoney('${uid}')">
+ Hungy
</button>

<button onclick="removeMoney('${uid}')">
- Hungy
</button>

</div>

`;

});

}
);

}

window.banUser =
async function(uid){

await update(
ref(db,"users/"+uid),
{
banned:true
}
);

};

window.unbanUser =
async function(uid){

await update(
ref(db,"users/"+uid),
{
banned:false
}
);

};

window.muteUser =
async function(uid){

await update(
ref(db,"users/"+uid),
{
muted:true
}
);

};

window.unmuteUser =
async function(uid){

await update(
ref(db,"users/"+uid),
{
muted:false
}
);

};

window.giveMoney =
async function(uid){

let amount =
Number(prompt("Kolik Hungů přidat?"));

let snap =
await get(
ref(db,"users/"+uid)
);

let u =
snap.val();

await update(
ref(db,"users/"+uid),
{
money:
(u.money || 0)
+ amount
}
);

};

window.removeMoney =
async function(uid){

let amount =
Number(prompt("Kolik Hungů odebrat?"));

let snap =
await get(
ref(db,"users/"+uid)
);

let u =
snap.val();

await update(
ref(db,"users/"+uid),
{
money:
Math.max(
0,
(u.money || 0)
- amount
)
}
);

};

/* BANKA */

async function sendMoney(){

let targetName =
bankUser.value.trim();

let amount =
Number(bankAmount.value);

if(!targetName){

alert("Zadej příjemce");
return;

}

if(!amount || amount<=0){

alert("Neplatná částka");
return;

}

let usersSnap =
await get(ref(db,"users"));

let users =
usersSnap.val();

let targetUID = null;
let targetUser = null;

Object.entries(users).forEach(([uid,u])=>{

if(
u.username &&
u.username.toLowerCase()
===
targetName.toLowerCase()
){

targetUID = uid;
targetUser = u;

}

});

if(!targetUID){

alert("Uživatel nenalezen");
return;

}

if(targetUID===currentUID){

alert("Nemůžeš poslat sám sobě");
return;

}

if(currentUser.money < amount){

alert("Nemáš dost Hungů");
return;

}

await update(
ref(db,"users/"+currentUID),
{
money:
currentUser.money
-
amount
}
);

await update(
ref(db,"users/"+targetUID),
{
money:
(targetUser.money||0)
+
amount
}
);

await push(
ref(db,"transactions"),
{
from:
currentUser.username,

to:
targetUser.username,

amount:
amount,

time:
new Date().toLocaleString()
}
);

bankUser.value="";
bankAmount.value="";

alert("Převod odeslán");

let mySnap =
await get(
ref(db,"users/"+currentUID)
);

currentUser =
mySnap.val();

money.innerHTML =
currentUser.money +
" Hungů";

bankMoney.innerHTML =
currentUser.money +
" Hungů";

}

function loadBank(){

bankMoney.innerHTML =
currentUser.money +
" Hungů";

onValue(
ref(db,"transactions"),
(snapshot)=>{

let data =
snapshot.val();

bankHistory.innerHTML="";

if(!data){

bankHistory.innerHTML=

'<div class="news">Žádné převody</div>';

return;

}

Object.values(data)
.reverse()
.forEach(tx=>{

if(
tx.from===currentUser.username
||
tx.to===currentUser.username
){

bankHistory.innerHTML +=

`

<div class="news">

<b>

${tx.from}

</b>

→

<b>

${tx.to}

</b>

<br>

${tx.amount}
 Hungů

<br>

${tx.time}

</div>

`;

}

});

}
);

}
/* LOGOUT */

async function logout(){

await signOut(auth);

}

</script>

</body>
</html>
